<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/libs/CS559/style559.css" />
    <style>
      html,
      body {
        margin: 0;
        background: #0e1632;
        color: #eaf7ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: auto;
        min-height: 100%;
      }

      #layout {
        width: min(100%, 1500px);
        margin: 0 auto;
        padding: 12px;
        box-sizing: border-box;
        display: flex;
        gap: 12px;
        flex-direction: column;
        align-items: center;
      }

      #div1 {
        width: 100%;
        max-width: 1100px;
        position: relative;
        flex: 1 1 760px;
        min-width: 0;
      }

      canvas {
        display: block;
        width: 100% !important;
        max-width: 100%;
        height: auto !important;
        aspect-ratio: 1100 / 720;
        border-radius: 6px;
      }

      #ui-column {
        width: 100%;
        max-width: 1100px;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 12px;
        box-sizing: border-box;
      }

      @media (max-width: 1460px) {
        #layout {
          align-items: center;
        }
        #div1 {
          width: 100%;
          flex-basis: auto;
        }
        #ui-column {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>

  <body>
    <div id="layout">
      <div id="div1"></div>
      <div id="ui-column"></div>
    </div>
        <script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/",
        "three/": "https://unpkg.com/three@0.180.0/",
        "CS559/": "/libs/CS559/",
        "CS559-Framework/": "/libs/CS559-Framework/",
        "examples/": "/examples/",
        "three/webgpu": "https://unpkg.com/three@0.180.0/build/three.webgpu.js",
        "three/tsl": "https://unpkg.com/three@0.180.0/build/three.tsl.js"
    }
}
</script>
    <script src="07-06-01.js" type="module"></script>
  </body>
</html>
